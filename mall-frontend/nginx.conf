server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://mall-gateway:8080;
    }

    location /static/ {
        proxy_pass http://mall-gateway:8080;
    }
}